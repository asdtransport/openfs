[project]
name = "openfs-indexer"
version = "0.1.0"
description = "Content indexer for OpenFS — crawl, chunk, and ingest into any adapter"
requires-python = ">=3.11"
dependencies = [
    "click>=8.1",
    "httpx>=0.27",
]

[project.optional-dependencies]
chroma = ["chromadb>=1.0"]
embedding = ["sentence-transformers>=3.0"]

[project.scripts]
openfs-index = "openfs_indexer.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv]
dev-dependencies = [
    "pytest>=8.0",
    "ruff>=0.6",
]
